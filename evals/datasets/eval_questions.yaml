# SemaFlow Stage 6 evaluation set.
#
# This is the regression suite the Stage 2 golden_set.yaml promised it would
# grow into. It is NOT a generic answer-quality benchmark. Every case is
# labeled to score one or more governance dimensions:
#
#   expected_route     -> routing accuracy (the SHAPE of the question)
#   expected_measure   -> measure-selection accuracy (SQL/hybrid)
#   expected_glossary  -> glossary resolution (dot-namespaced refs)
#   expected_status    -> the trust boundary: does the pipeline succeed or
#                         correctly refuse with no_measure_matched
#   expected_sources   -> retrieval hit-rate (any-of must appear in top_k)
#   expects_hedge      -> hedge calibration: reviewer confidence < 0.7
#
# The senior signal lives in the *_oos cases. An out-of-scope SQL question is
# still SQL-SHAPED, so the router should route it to sql; the system must then
# REFUSE (no_measure_matched) rather than invent a measure. An out-of-scope RAG
# question is still RAG-shaped; the system must HEDGE rather than fabricate
# policy. Routing (shape) and feasibility (governance) are scored separately on
# purpose: a correct refusal is a pass, not a failure.
#
# Locked scope: no case requires a measure or corpus doc that does not already
# exist. The 4 measures are top_categories_by_revenue, aov_by_state,
# seller_ratings_by_state, return_rate_by_category. Sources are the .md
# basenames the retriever returns.

cases:
  # ── SQL positive: maps cleanly to one of the 4 measures ──────────────────
  - id: s1
    text: "What were the top 5 categories by revenue overall?"
    category: sql_positive
    expected_route: sql
    expected_measure: top_categories_by_revenue
    expected_glossary: []
    expected_status: success
    note: "top_n=5, no date filter. The Stage 2 golden q5."

  - id: s2
    text: "Which product categories had the highest revenue last quarter?"
    category: sql_positive
    expected_route: sql
    expected_measure: top_categories_by_revenue
    expected_glossary: [time_periods.last_quarter]
    expected_status: success
    note: "Relative time resolves against dataset_reference_date 2018-10-17, not now()."

  - id: s3
    text: "What is the average order value by customer state?"
    category: sql_positive
