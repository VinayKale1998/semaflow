    expected_status: no_measure_matched

  # ── RAG out-of-scope: rag-SHAPED but the corpus has no resolving doc. ─────
  # Must HEDGE. Correct behavior is route=rag and reviewer confidence < 0.7.
  - id: g1
    text: "How are damaged items handled when the seller is at fault?"
    category: rag_oos
    expected_route: rag
    expected_sources: []
    expects_hedge: true
    expects_revision: true
    expects_recovery: false
    note: "The locked Stage 5 hedge demo (golden q6). Adjacent chunks (damage in transit) exist; seller-fault handling does not."

  - id: g2
    text: "What is Olist's policy on cryptocurrency payments?"
    category: rag_oos
    expected_route: rag
    expected_sources: []
