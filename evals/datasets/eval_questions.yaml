  # ── SQL out-of-scope: sql-SHAPED but no declared measure. Must REFUSE. ────
  # The trust boundary. Correct behavior is route=sql AND
  # status=no_measure_matched. Selecting any measure here is a hallucination.
  - id: x1
    text: "What is the total freight cost per seller?"
    category: sql_oos
    expected_route: sql
    expected_measure: null
    expected_status: no_measure_matched
    note: "No freight measure exists. Must refuse, not bend an unrelated measure."

  - id: x2
    text: "How many orders were delivered later than their estimated delivery date?"
    category: sql_oos
    expected_route: sql
    expected_measure: null
